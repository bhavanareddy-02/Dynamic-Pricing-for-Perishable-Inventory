# Conda environment for the dynamic pricing pipeline.
#
#   conda env create -f environment.yml
#   conda activate dynamic_pricing
#
# Prophet is pulled from conda-forge because pip-installing it on Windows
# is fragile (cmdstanpy / compiler issues).

name: dynamic_pricing
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # Core
  - numpy>=1.24,<2.0
  - pandas>=2.0
  - scipy>=1.10
  - matplotlib>=3.7

  # ML
  - scikit-learn>=1.3
  - lightgbm>=4.0
  - xgboost>=2.0
  - statsmodels>=0.14
  - prophet>=1.1.5

  # Dashboard (Phase 2)
  - streamlit>=1.30
  - plotly>=5.18

  # Anything not on conda-forge → fall through to pip
  - pip:
      - # (intentionally empty — add here if conda channel ever lags)
